name: Daily BCCI Schedule Sync

on:
  # Runs at 7:00 AM IST (01:30 UTC) every day
  schedule:
    - cron: '30 1 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      team:
        description: 'Team to sync (men / women / both)'
        required: false
        default: 'both'

jobs:
  sync:
    name: Sync BCCI Schedules
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Initialize database
        run: npm run setup
        env:
          NODE_ENV: production

      - name: Run sync
        run: npm run sync
        env:
          NODE_ENV: production
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISABLE_CRON: 'true'

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cricket-db-${{ github.run_id }}
          path: data/cricket.db
          retention-days: 7

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-snapshots-${{ github.run_id }}
          path: snapshots/
          retention-days: 3
          if-no-files-found: ignore
